version: "3.9"

services:

  api:
    build:
      context: .
      target: api
    image: churn-api:latest
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro   # live-reload models without rebuild
    environment:
      - MODEL_DIR=/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    container_name: churn-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app/frontend
      - ./requirements.txt:/app/requirements.txt
    command: >
      sh -c "pip install --quiet streamlit plotly requests &&
             streamlit run frontend/app.py
             --server.port=8501
             --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped
